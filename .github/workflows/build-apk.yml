name: Build Flet APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Platform Folders
        run: |
          mkdir -p lib_backup
          mv lib/* lib_backup/ || true
          flutter create . --platforms android --org com.abdelrahman.scheduler --project-name shift_scheduler
          mv lib_backup/* lib/
          rm -rf lib_backup

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shift-scheduler-apk
          path: build/app/outputs/flutter-apk/app-release.apk
