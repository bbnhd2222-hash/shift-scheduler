name: Build Flet APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build APK
        run: |
          python -c '
          import sys
          import flet_cli.cli
          import rich.prompt
          from rich.prompt import Confirm
          Confirm.ask = lambda *a, **k: True
          sys.argv = ["flet", "build", "apk", "./src", "--project", "ShiftScheduler", "--product", "Egyptian Nursing Shift Scheduler", "--org", "com.abdelrahman.scheduler"]
          flet_cli.cli.main()
          '

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shift-scheduler-apk
          path: build/apk/**/*.apk
